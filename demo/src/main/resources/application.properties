spring.application.name=demo

# Database configuration for KINX HA MySQL service
spring.datasource.url=jdbc:mysql://mysql-ha-service:3306/kinxweb
spring.datasource.username=repl_user
spring.datasource.password=kinx123!@#
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Logging configuration
logging.file.name=/app/logs/spring.log
logging.level.root=INFO
